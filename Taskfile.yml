# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

env:
  PACKAGE_NAME: "github.com/jwc20/sniffy"

tasks:
  default:
    desc: Run standard pre-commit checks
    cmds:
      - task: mod
      - task: test
      - task: build

  mod:
    desc: Download and tidy Go modules
    cmds:
      - go mod download
      - go mod tidy

  test:
    desc: Run the test suite
    aliases: [t]
    cmds:
      - go test -v ./...

  build:
    desc: Build the sniffy binary into /bin
    sources:
      - "./**/*.go"
    generates:
      - "./bin/sniffy"
    cmds:
      - go build -v -o ./bin/sniffy ./cmd/sniffy

  install:
    desc: Install sniffy to GOBIN
    sources:
      - "./**/*.go"
    cmds:
      - go install -v ./cmd/sniffy

  run:
    desc: Build and run sniffy locally
    cmds:
      - task: build
      - ./bin/sniffy {{.CLI_ARGS | default "."}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf ./bin/
      - rm -f cover.out

  cover:
    desc: Run tests with coverage report
    cmds:
      - go test -coverprofile=cover.out ./...
      - go tool cover -html=cover.out